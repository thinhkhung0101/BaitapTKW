<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đúng Người Đúng Thời Điểm</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <section class="detail-card">
        <a class="back-link" href="index.html">← Quay lại trang chính</a>
        <p class="eyebrow">Trang bài hát</p>
        <h1>Đúng Người Đúng Thời Điểm</h1>
        <p class="subtitle">Thanh Hưng</p>

        <div class="video-frame">
          <iframe
            src="https://www.youtube.com/embed/KFmQUJ2dj3k"
            title="Đúng Người Đúng Thời Điểm"
            loading="lazy"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
          ></iframe>
        </div>

        <div class="song-info">
          <p>
            Đây là bài hát mang năng lượng sáng hơn, gợi cảm giác gặp đúng người
            vào đúng lúc.
          </p>
          <p>
            Tông hồng trắng giúp trang vẫn mềm mại nhưng không quá rườm rà, hợp
            với tinh thần nhẹ nhàng của bài hát.
          </p>
          <a
            class="watch-button"
            href="https://www.youtube.com/watch?v=KFmQUJ2dj3k"
            target="_blank"
            rel="noreferrer"
            >Mở trên YouTube</a
          >
        </div>
      </section>
    </main>
  </body>
</html>
